name: resourcedevta
description: Resource-Devta - community data collection and volunteer mobilization.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI + navigation
  go_router: ^14.6.2
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Supabase
  supabase_flutter: ^2.8.1

  # Env
  flutter_dotenv: ^5.2.1

  # Auth
  google_sign_in: ^6.2.1

  # Geo + matching
  geolocator: ^13.0.2

  # Charts
  fl_chart: ^0.69.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  # Add these two lines right here:
  assets:
    - .env